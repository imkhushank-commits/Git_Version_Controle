<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        nav {
            background-color: #333;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav ul li a {
            color: #fff;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav ul li a:hover {
            color: #4CAF50;
        }

        .btn-login, .btn-signup {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-login {
            background-color: transparent;
            color: #fff;
            border: 1px solid #fff;
        }

        .btn-login:hover {
            background-color: #fff;
            color: #333;
        }

        .btn-signup {
            background-color: #4CAF50;
            color: #fff;
        }

        .btn-signup:hover {
            background-color: #45a049;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 60px 30px;
            background-color: #f5f5f5;
            gap: 40px;
        }

        .hero-image {
            flex: 1;
        }

        .hero-image img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .hero-content {
            flex: 1;
        }

        .hero-content h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #333;
        }

        .hero-content p {
            font-size: 16px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .hero-content button {
            padding: 10px 25px;
            background-color: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">MyLogo</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact Us</a></li>
            <li><button class="btn-login">Login</button></li>
            <li><button class="btn-signup">Sign Up</button></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-image">
            <img src="756e5ee5266289e5d933ebf49f353790.jpg" alt="Hero Image">
        </div>
        <div class="hero-content">
            <h1>Welcome to Our Website</h1>
            <p>This is your hero section with image on the left and content on the right. Add your compelling message here to engage your audience.</p>
            <button>Get Started</button>
        </div>
    </section>

    <section id="home">
        <h2>Welcome to Home</h2>
    </section>
</body>
</html>
